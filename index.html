<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", sans-serif; height: 100vh;
      display: flex; flex-direction: row;
      background: #1E293B; transition: background 0.5s ease;
      overflow: hidden;
    }
    #main-content {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
    }
    h1 { color: white; font-size: 2rem; margin-bottom: 10px;
         text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
    #color-code {
      font-family: "Consolas", monospace; font-size: clamp(1.5rem, 4vw, 3.5rem);
      font-weight: 800; color: white; margin: 20px 0;
      text-shadow: 0 2px 15px rgba(0,0,0,0.4);
      cursor: pointer; text-align: center; word-break: break-word;
      max-width: 90%; line-height: 1.3; padding: 0 20px;
    }
    #color-code:hover::after { content: " 📋"; font-size: clamp(1rem, 2vw, 1.5rem); }
    .buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 30px; }
    button {
      padding: 14px 32px; font-size: 1.1rem; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer;
      transition: transform 0.15s, background-color 0.2s;
    }
    button:active { transform: scale(0.95); }
    #random-btn { background: white; color: #1E293B; }
    #gradient-btn { background: #3B82F6; color: white; }
    #copy-btn   { background: rgba(255,255,255,0.2); color: white; }
    #sidebar {
      width: 320px; background: rgba(0,0,0,0.4);
      padding: 20px; display: flex; flex-direction: column;
      border-left: 1px solid rgba(255,255,255,0.1);
      box-shadow: -5px 0 15px rgba(0,0,0,0.3);
    }
    #sidebar h3 {
      color: white; margin-bottom: 20px; font-weight: 600; text-align: center;
      font-size: 1.5rem; letter-spacing: 1px;
    }
    #history-list {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
      padding-right: 5px;
    }
    .history-item-container {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.05); padding: 12px;
      border-radius: 12px; transition: background 0.2s;
    }
    .history-item-container:hover { background: rgba(255,255,255,0.1); }
    .history-color-preview {
      width: 45px; height: 45px; border-radius: 50%;
      cursor: pointer; border: 2px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    .history-color-preview:hover { transform: scale(1.1); border-color: white; }
    .history-delete-btn {
      background: transparent; color: #EF4444; border: 1px solid #EF4444;
      padding: 6px 12px; border-radius: 8px; cursor: pointer;
      font-weight: bold; transition: all 0.2s; font-size: 0.85rem;
    }
    .history-delete-btn:hover { background: #EF4444; color: white; }

    /* Suggestions Styles */
    #suggestions-container {
      margin-top: 20px; text-align: center; width: 90%; max-width: 600px;
    }
    .suggestion-item {
      width: 50px; height: 50px; border-radius: 12px; cursor: pointer;
      border: 2px solid rgba(255,255,255,0.3); transition: transform 0.2s, border-color 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .suggestion-item:hover { transform: translateY(-3px); border-color: white; }

    /* Modal Styles */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); display: none;
      justify-content: center; align-items: center; z-index: 1000;
      backdrop-filter: blur(5px);
    }
    .modal.show { display: flex; }
    .modal-content {
      background: #1E293B; padding: 30px; border-radius: 20px;
      color: white; width: 400px; box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .modal-content h2 { margin-bottom: 20px; text-align: center; }
    .modal-content label { display: block; margin-bottom: 8px; color: #cbd5e1; font-size: 0.95rem;}
    .modal-content input {
      width: 100%; padding: 12px; margin-bottom: 20px;
      border-radius: 10px; border: none; outline: none;
      background: rgba(255,255,255,0.1); color: white; font-size: 1.1rem;
    }
    .modal-content input:focus { box-shadow: 0 0 0 2px #3B82F6; }
    .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
    .modal-buttons button { padding: 10px 20px; font-size: 1rem; }
    #apply-grad-btn { background: #3B82F6; color: white; border: none; }
    #cancel-grad-btn { background: transparent; border: 1px solid white; color: white; }
    
    #history-list::-webkit-scrollbar { width: 6px; }
    #history-list::-webkit-scrollbar-track { background: transparent; }
    #history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

    #toast {
      position: fixed; bottom: 30px; background: #16A34A; color: white;
      padding: 12px 24px; border-radius: 8px; font-weight: 600;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="main-content">
    <h1>Color Generator</h1>
    <div id="color-code">#1E293B</div>
    <div class="buttons">
      <button id="random-btn">Generate Solid</button>
      <button id="gradient-btn">Generate Gradient</button>
      <button id="copy-btn">Copy Code</button>
    </div>
    
    <div id="suggestions-container">
      <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 12px;">
        <p style="color: rgba(255,255,255,0.8); font-weight: 600; font-size: 1.1rem; margin: 0;">Suggested Gradients</p>
        <button id="refresh-suggestions-btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.5); color: white; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: background 0.2s;">Refresh</button>
      </div>
      <div id="suggestions-list" style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
         <!-- Populated via JS -->
      </div>
    </div>
  </div>

  <div id="sidebar">
    <h3>History</h3>
    <div id="history-list"></div>
  </div>

  <!-- Modal for Custom Gradient -->
  <div id="gradient-modal" class="modal">
    <div class="modal-content">
      <h2>Create Gradient</h2>
      <div id="gradient-inputs-container">
        <div class="color-input-group">
          <label>Color 1 (Hex, RGB, or Name):</label>
          <input type="text" class="grad-color-input" placeholder="e.g. #FF0000 or red">
        </div>
        <div class="color-input-group">
          <label>Color 2 (Hex, RGB, or Name):</label>
          <input type="text" class="grad-color-input" placeholder="e.g. #0000FF or blue">
        </div>
      </div>
      <div style="text-align: right; margin-bottom: 20px;">
        <button id="add-color-btn" style="background: transparent; border: none; color: #3B82F6; cursor: pointer; font-size: 0.95rem; font-weight: 600; padding: 0;">+ Add 1 more color</button>
      </div>
      <div class="modal-buttons">
        <button id="cancel-grad-btn">Cancel</button>
        <button id="apply-grad-btn">Apply</button>
      </div>
    </div>
  </div>

  <div id="toast">Copied to clipboard!</div>
  <script src="script.js"></script>
</body>
</html>
